basePath: /api/v1
definitions:
  api.AppInput:
    description: App input model
    properties:
      data:
        properties:
          attributes:
            properties:
              datasource_ids:
                items:
                  type: integer
                type: array
              description:
                type: string
              llm_ids:
                items:
                  type: integer
                type: array
              name:
                type: string
              user_id:
                type: integer
            type: object
          type:
            type: string
        type: object
    type: object
  api.AppResponse:
    description: App response model
    properties:
      attributes:
        properties:
          credential_id:
            type: integer
          datasource_ids:
            items:
              type: integer
            type: array
          description:
            type: string
          llm_ids:
            items:
              type: integer
            type: array
          name:
            type: string
          user_id:
            type: integer
        type: object
      id:
        type: string
      type:
        type: string
    type: object
  api.CatalogueInput:
    description: Catalogue input model
    properties:
      data:
        properties:
          attributes:
            properties:
              name:
                type: string
            type: object
          type:
            type: string
        type: object
    type: object
  api.CatalogueLLMInput:
    description: Catalogue-LLM relationship input model
