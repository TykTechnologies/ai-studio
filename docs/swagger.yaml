          name:
            type: string
        type: object
      id:
        type: string
      type:
        type: string
    type: object
  api.CredentialInput:
    description: Credential input model
    properties:
      data:
        properties:
          attributes:
            properties:
              active:
                type: boolean
            type: object
          type:
            type: string
        type: object
    type: object
  api.CredentialResponse:
    description: Credential response model
    properties:
      attributes:
        properties:
          active:
            type: boolean
          key_id:
            type: string
          secret:
            type: string
        type: object
      id:
        type: string
      type:
        type: string
    type: object
  api.DataCatalogueDatasourceInput:
