name: Build and Deploy Microgateway

on:
  workflow_run:
    workflows: ["CI tests"]
    types:
      - completed
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - 'microgateway/**'
      - '.github/workflows/microgateway-prod.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even on non-main branch'
        required: false
        default: 'false'
        type: boolean

env:
  GOPRIVATE: github.com/TykTechnologies
  REGISTRY: docker.io

jobs:
  # Build and push Community Edition
  build-ce:
    name: Build and Push CE
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'pull_request')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for CE
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/tykio/microgateway
          tags: |
            type=ref,event=branch
            type=ref,event=pr,suffix=-ce
            type=sha,prefix={{branch}}-ce-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYY-MM-DD'}}-{{sha}},enable={{is_default_branch}}

      - name: Get build information
        id: build_info
        run: |
          echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')" >> $GITHUB_OUTPUT
          echo "build_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push CE Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./microgateway/deployments/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.build_info.outputs.version }}
            BUILD_HASH=${{ steps.build_info.outputs.build_hash }}
            BUILD_TIME=${{ steps.build_info.outputs.build_time }}
            EDITION=ce
          cache-from: type=gha,scope=microgateway-ce
          cache-to: type=gha,mode=max,scope=microgateway-ce

      - name: Generate CE deployment summary
        run: |
          echo "## 🚀 Microgateway CE Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Edition:** Community Edition (CE)" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.build_info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Hash:** ${{ steps.build_info.outputs.build_hash }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Time:** ${{ steps.build_info.outputs.build_time }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- **CGO Enabled:** Yes (SQLite support)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Container Images" >> $GITHUB_STEP_SUMMARY
          echo "The following CE images have been built:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | while IFS= read -r tag; do
            echo "- \`$tag\`" >> $GITHUB_STEP_SUMMARY
          done

  # Build and push Enterprise Edition
  build-ent:
    name: Build and Push ENT
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.ORG_GH_TOKEN }}

      - name: Configure Git for Enterprise Access
        run: |
          git config --global url."https://${{ secrets.ORG_GH_TOKEN }}@github.com".insteadOf "https://github.com"

      - name: Initialize Enterprise Submodule
        run: |
          git submodule update --init --recursive
          if [ ! -f enterprise/.git ]; then
            echo "❌ ERROR: Enterprise submodule not initialized"
            exit 1
          fi
          echo "✅ Enterprise submodule initialized"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for ENT
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/tykio/microgateway-enterprise
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-ent-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYY-MM-DD'}}-{{sha}},enable={{is_default_branch}}

      - name: Get build information
        id: build_info
        run: |
          echo "version=$(git describe --tags --always --dirty 2>/dev/null || echo 'dev')" >> $GITHUB_OUTPUT
          echo "build_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push ENT Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./microgateway/deployments/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.build_info.outputs.version }}
            BUILD_HASH=${{ steps.build_info.outputs.build_hash }}
            BUILD_TIME=${{ steps.build_info.outputs.build_time }}
            EDITION=ent
          cache-from: type=gha,scope=microgateway-ent
          cache-to: type=gha,mode=max,scope=microgateway-ent

      - name: Generate ENT deployment summary
        run: |
          echo "## 🚀 Microgateway ENT Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Edition:** Enterprise Edition (ENT)" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.build_info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Hash:** ${{ steps.build_info.outputs.build_hash }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Time:** ${{ steps.build_info.outputs.build_time }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms:** linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- **CGO Enabled:** Yes (SQLite support)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Container Images" >> $GITHUB_STEP_SUMMARY
          echo "The following ENT images have been built:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.meta.outputs.tags }}' | while IFS= read -r tag; do
            echo "- \`$tag\`" >> $GITHUB_STEP_SUMMARY
          done

  # Usage examples and documentation
  summary:
    name: Generate Usage Examples
    runs-on: ubuntu-latest
    needs: [build-ce, build-ent]
    if: always()
    steps:
      - name: Generate comprehensive summary
        run: |
          echo "## 📦 Microgateway Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Available Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Community Edition:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`tykio/microgateway:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Platforms: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- SQLite support: ✅ Enabled" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Enterprise Edition:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`tykio/microgateway-enterprise:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Platforms: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
          echo "- SQLite support: ✅ Enabled" >> $GITHUB_STEP_SUMMARY
          echo "- Enterprise features: ✅ Included" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage Examples" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**CE - Standalone Mode:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker run -p 8080:8080 -e DATABASE_TYPE=sqlite tykio/microgateway:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ENT - With Budget Enforcement:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker run -p 8080:8080 \\" >> $GITHUB_STEP_SUMMARY
          echo '  -e DATABASE_TYPE=sqlite \' >> $GITHUB_STEP_SUMMARY
          echo '  -e GATEWAY_MODE=standalone \' >> $GITHUB_STEP_SUMMARY
          echo "  tykio/microgateway-enterprise:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ENT - Edge Mode (Hub-Spoke):**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker run -p 8080:8080 \\" >> $GITHUB_STEP_SUMMARY
          echo '  -e GATEWAY_MODE=edge \' >> $GITHUB_STEP_SUMMARY
          echo '  -e CONTROL_ENDPOINT=grpc://control-server:9090 \' >> $GITHUB_STEP_SUMMARY
          echo '  -e EDGE_ID=edge-1 \' >> $GITHUB_STEP_SUMMARY
          echo "  tykio/microgateway-enterprise:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-ce
    if: github.ref == 'refs/heads/main' || inputs.force_deploy
    environment: staging

    steps:
      - name: Deploy to staging environment
        run: |
          echo "🚀 Deploying microgateway CE to staging environment"
          echo "Image: tykio/microgateway:latest"
          # Add your staging deployment logic here

      - name: Health check
        run: |
          echo "🏥 Running health checks against staging deployment"
          # Add health check logic here

      - name: Staging deployment summary
        run: |
          echo "## 🎯 Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** tykio/microgateway:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Deployed Successfully" >> $GITHUB_STEP_SUMMARY
