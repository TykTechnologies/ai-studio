name: CI tests

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  golangci-lint:
    if: false # temporary disable
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      -
        name: Fetch base branch
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch origin ${{ github.base_ref }}
      -
        name: golangci-lint
        if: ${{ github.event_name == 'pull_request' }}
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --out-format=checkstyle:golanglint.xml --timeout=300s --max-issues-per-linter=0 --max-same-issues=0 --new-from-rev=origin/${{ github.base_ref }}
      -
        uses: actions/upload-artifact@v3
        with:
          name: golangcilint
          retention-days: 1
          path: |
            golanglint.xml

  test:
    name: Unit tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    steps:
      -
        name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      -
        name: Checkout langchaingo repository
        uses: actions/checkout@v4
        with:
          repository: lonelycode/langchaingo
          path: langchaingo
          fetch-depth: 2

      -
        name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      -
        name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      -
        name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      -
        name: Install Dependencies and basic hygiene test
        id: hygiene
        run: |
          go install golang.org/x/tools/cmd/goimports@latest

      -
        name: Fetch base branch
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch origin ${{ github.base_ref }}

      -
        name: Cache
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      -
        name: Cache node modules
        uses: actions/cache@v3
        env:
          cache-name: cache-node-modules
        with:
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/ui/**') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      -
        name: Build UI
        run: |
          cd ui/admin-frontend
          npm ci
          npm test
          CI=false npm run build
          cd ../..

      -
        name: Run Go Tests
        id: ci-tests
        run: |
          cp .env.example .env
          cd docs/site && hugo && cd ../..
          go test ./...
