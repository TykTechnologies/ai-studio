name: CI tests

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  golangci-lint:
    if: false
    runs-on: ubuntu-latest-m-2
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      -
        name: Fetch base branch
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch origin ${{ github.base_ref }}
      -
        name: golangci-lint
        if: ${{ github.event_name == 'pull_request' }}
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --out-format=checkstyle:golanglint.xml --timeout=300s --max-issues-per-linter=0 --max-same-issues=0 --new-from-rev=origin/${{ github.base_ref }}
      -
        uses: actions/upload-artifact@v4
        with:
          name: golangcilint
          retention-days: 1
          path: |
            golanglint.xml

  test:
    name: Tests
    runs-on: ubuntu-latest-m-2
    steps:
      -
        name: Checkout main repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          submodules: true

      -
        name: Checkout langchaingo repository
        uses: actions/checkout@v4
        with:
          repository: lonelycode/langchaingo
          path: langchaingo
          fetch-depth: 2

      -
        name: Setup Golang
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      -
        name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      -
        name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      -
        name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      -
        name: Fetch base branch
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch origin ${{ github.base_ref }}

      # Improved Go dependency caching
      -
        name: Go Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Cache Hugo resources
      -
        name: Cache Hugo resources
        uses: actions/cache@v3
        with:
          path: docs/site/resources
          key: ${{ runner.os }}-hugomod-${{ hashFiles('docs/site/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      -
        name: Build UI
        run: |
          cd ui/admin-frontend
          npm ci
          npm test
          CI=false npm run build
          cd ../..

      -
        name: Build Docs
        run: |
          cp .env.example .env
          cd docs/site && hugo && cd ../..
      
      - name: Clean Go Cache
        run: |
          go version
          go clean -modcache
          go clean -cache
          go mod tidy
          
      -
        name: Run Go Tests
        id: ci-tests
        run: |
          go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      -
        name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt
