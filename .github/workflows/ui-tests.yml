name: UI E2E Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
  push:
    branches:
      - main
      - release-**
      - QA-**
    tags:
      - "v*"

env:
  GOPRIVATE: github.com/TykTechnologies

jobs:
  ui-e2e-tests:
    name: UI E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Build Frontend
        run: |
          cd ui/admin-frontend
          npm ci
          CI=false npm run build

      - name: Start Test Environment
        env:
          TYK_AI_LICENSE: ${{ secrets.TYK_AI_LICENSE }}
          TYK_AI_SECRET_KEY: ${{ secrets.TYK_AI_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_KEY }}
          ANTHROPIC_AI_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GO_BUILD_FLAGS: "-buildvcs=false"
        run: |
          docker compose -f tests/compose.yml up -d

      - name: Install Playwright
        working-directory: tests/ui
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Wait for AI Studio
        run: |
          echo "Waiting for AI Studio to start..."
          attempts=0
          max_attempts=60
          while [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/common/api/v1/notifications/unread/count)" != "401" ]; do
            attempts=$((attempts+1))
            echo "Attempt $attempts/$max_attempts - Waiting for AI Studio..."
            if [ $attempts -ge $max_attempts ]; then
              echo "Timed out after $max_attempts attempts. AI Studio failed to start."
              echo "Docker container status:"
              docker compose -f tests/compose.yml ps
              echo "Docker logs:"
              docker compose -f tests/compose.yml logs --tail=100
              exit 1
            fi
            sleep 5
          done
          echo "AI Studio is ready!"

      - name: Run Playwright Tests
        id: playwright
        working-directory: tests/ui
        run: npm run test

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          retention-days: 7

      - name: Upload Test Results to S3
        if: failure() && steps.playwright.outcome != 'success'
        working-directory: tests/ui
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.UI_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.UI_AWS_SECRET_ACCESS_KEY }}
          RUN_ID: 'midsommar/${{ github.run_id }}'
        run: npm run upload_report_to_s3

      - name: Add S3 Report Link to Summary
        if: failure() && steps.playwright.outcome != 'success'
        run: |
          echo "# UI Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Status: :x: Failed" >> $GITHUB_STEP_SUMMARY
          echo "- [View Report on S3](https://tyk-qa-reports.s3.eu-central-1.amazonaws.com/midsommar/${{ github.run_id }}/index.html)" >> $GITHUB_STEP_SUMMARY

      - name: Collect Docker Logs
        if: failure()
        run: |
          echo "Collecting Docker logs..."
          docker compose -f tests/compose.yml logs > docker-compose.log 2>&1

      - name: Upload Docker Logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker-compose-logs
          path: docker-compose.log
          retention-days: 3

      - name: Cleanup
        if: always()
        run: |
          echo "Stopping test environment..."
          docker compose -f tests/compose.yml down -v --remove-orphans
          echo "Cleanup complete"
