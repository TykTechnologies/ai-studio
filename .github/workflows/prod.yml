name: Deploy to chat.tyk.technology

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      -
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      -
        name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23.2'
          cache-dependency-path: go.sum

      # Improved Go dependency caching
      -
        name: Go Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      -
        name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      # Cache Hugo resources
      -
        name: Cache Hugo resources
        uses: actions/cache@v3
        with:
          path: docs/site/resources
          key: ${{ runner.os }}-hugomod-${{ hashFiles('docs/site/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugomod-

      -
        name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      -
        name: Build UI
        run: |
          cd ui/admin-frontend
          npm ci
          CI=false npm run build
          cd ../..

      -
        name: Build Docs
        run: |
          cp .env.example .env
          git clone https://github.com/alex-shpak/hugo-book.git docs/site/themes/hugo-book
          cd docs/site && hugo && cd ../..

      -
        name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc libsqlite3-dev

      -
        name: Build Go Binary
        run: |
          git clone https://github.com/lonelycode/langchaingo.git /tmp/langchaingo
          echo "Building ARM64 binary"
          CC=aarch64-linux-gnu-gcc GOOS=linux GOARCH=arm64 CGO_ENABLED=1 go build -o midsommar-arm64
          chmod +x midsommar-arm64

      -
        name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      -
        name: Build and Push Image
        run: |
          docker build -t tykio/midsommar:latest .
          docker push tykio/midsommar:latest

      -
        name: Deploy to Remote Server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
          ssh $SSH_USER@$SSH_HOST "cd /root/midsommar && docker compose pull && docker compose up --detach --build midsommar"
