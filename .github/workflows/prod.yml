name: Deploy to chat.tyk.technology

on:
  push:
    branches:
      - main

env:
  GOPRIVATE: github.com/TykTechnologies

jobs:
  # Build frontend once and share across all editions
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Build UI
        run: |
          cd ui/admin-frontend
          echo "Installing dependencies..."
          npm ci
          echo "Building UI..."
          PUBLIC_URL="/" REACT_APP_API_URL="" CI=false npm run build
          echo "Checking build output..."
          ls -la build
          echo "Verifying static files..."
          find build -type f | head -20
          cd ../..

      - name: Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ui/admin-frontend/build/
          retention-days: 1

  # Build Community Edition binaries
  build-ce-binaries:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ui/admin-frontend/build/

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc libsqlite3-dev

      - name: Build docs site
        run: |
          cd docs/site && npm install && NODE_ENV=production npm run docs:build

      - name: Remove enterprise module references for CE
        run: |
          sed -i '/github.com\/TykTechnologies\/midsommar\/v2\/enterprise/d' go.mod

      - name: Build CE Binaries
        run: |
          echo "Building CE binaries with CGO enabled..."
          echo "Building AMD64 binary..."
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-w -s" -trimpath \
            -o tyk-ai-studio-ce-amd64

          echo "Building ARM64 binary..."
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc \
            go build -ldflags="-w -s" -trimpath \
            -o tyk-ai-studio-ce-arm64

          chmod +x tyk-ai-studio-ce-*
          ls -lh tyk-ai-studio-ce-*

      - name: Upload CE Binaries
        uses: actions/upload-artifact@v4
        with:
          name: ce-binaries
          path: tyk-ai-studio-ce-*
          retention-days: 1

  # Build Community Edition Docker image
  build-ce-image:
    needs: [build-frontend, build-ce-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ui/admin-frontend/build/

      - name: Download CE Binaries
        uses: actions/download-artifact@v4
        with:
          name: ce-binaries

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push CE Images
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            tykio/tyk-ai-studio:latest
            tykio/midsommar:latest
          build-args: |
            EDITION=ce
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Build Enterprise Edition binaries
  build-ent-binaries:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.ORG_GH_TOKEN }}

      - name: Configure Git for Enterprise Access
        run: |
          git config --global url."https://${{ secrets.ORG_GH_TOKEN }}@github.com".insteadOf "https://github.com"

      - name: Initialize Enterprise Submodule
        run: |
          git submodule update --init --recursive
          if [ ! -f enterprise/.git ]; then
            echo "❌ ERROR: Enterprise submodule not initialized"
            exit 1
          fi
          echo "✅ Enterprise submodule initialized"

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ui/admin-frontend/build/

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc libsqlite3-dev

      - name: Build docs site
        run: |
          cd docs/site && npm install && NODE_ENV=production npm run docs:build

      - name: Build ENT Binaries
        run: |
          echo "Building ENT binaries with CGO enabled and enterprise tags..."
          echo "Building AMD64 binary..."
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -tags enterprise -ldflags="-w -s" -trimpath \
            -o tyk-ai-studio-ent-amd64

          echo "Building ARM64 binary..."
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc \
            go build -tags enterprise -ldflags="-w -s" -trimpath \
            -o tyk-ai-studio-ent-arm64

          chmod +x tyk-ai-studio-ent-*
          ls -lh tyk-ai-studio-ent-*

      - name: Upload ENT Binaries
        uses: actions/upload-artifact@v4
        with:
          name: ent-binaries
          path: tyk-ai-studio-ent-*
          retention-days: 1

  # Build Enterprise Edition Docker image
  build-ent-image:
    needs: [build-frontend, build-ent-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.ORG_GH_TOKEN }}

      - name: Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ui/admin-frontend/build/

      - name: Download ENT Binaries
        uses: actions/download-artifact@v4
        with:
          name: ent-binaries

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ENT Images
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            tykio/tyk-ai-studio-enterprise:latest
            tykio/midsommar-enterprise:latest
          build-args: |
            EDITION=ent
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy CE image to production server
  deploy-ce:
    needs: build-ce-image
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Remote Server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
          ssh $SSH_USER@$SSH_HOST "cd /root/ai-studio && docker compose pull && docker compose up --detach"
