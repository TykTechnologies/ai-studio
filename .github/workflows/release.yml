# yamllint disable rule:line-length rule:truthy
name: Release
# Based on gromit policy, extended for component/edition matrix

# Distribution channels covered by this workflow
# - Ubuntu and Debian (DEB)
# - RHEL and AL (RPM)
# - Docker Hub
# - Cloudsmith
on:
  push:
    tags:
      - "v*"

defaults:
  run:
    working-directory: midsommar

env:
  GOPRIVATE: github.com/TykTechnologies
  VARIATION: inverted
  DOCKER_BUILD_SUMMARY: false
  DOCKER_BUILD_RECORD_UPLOAD: false
  BASE_REF: ${{startsWith(github.event_name, 'pull_request') && github.base_ref || github.ref_name}}
jobs:
  goreleaser:
    name: "${{ matrix.component }}-${{ matrix.edition }}"
    runs-on: ubuntu-latest
    permissions:
      id-token: write # AWS OIDC JWT
      contents: read # actions/checkout
    strategy:
      fail-fast: false
      matrix:
        component: [studio, microgateway]
        edition: [ce, ent]
        include:
          # Studio CE
          - component: studio
            edition: ce
            golang_cross: 1.25-bullseye
            goreleaser: "ci/goreleaser/goreleaser.yml"
            goflags: ""
            cgo: 1
            rpmvers: "el/7 el/8 el/9 amazon/2 amazon/2023"
            debvers: "ubuntu/xenial ubuntu/bionic ubuntu/focal ubuntu/jammy ubuntu/noble debian/jessie debian/buster debian/bullseye debian/bookworm"
            pc_repo: "tyk/tyk-ai-studio"
            docker_image: "tykio/tyk-ai-studio"
            dockerfile: "ci/Dockerfile.distroless"
          # Studio ENT
          - component: studio
            edition: ent
            golang_cross: 1.25-bullseye
            goreleaser: "ci/goreleaser/goreleaser.yml"
            goflags: "-tags=enterprise"
            cgo: 1
            rpmvers: "el/7 el/8 el/9 amazon/2 amazon/2023"
            debvers: "ubuntu/xenial ubuntu/bionic ubuntu/focal ubuntu/jammy ubuntu/noble debian/jessie debian/buster debian/bullseye debian/bookworm"
            pc_repo: "tyk/tyk-ee-unstable"
            docker_image: "tykio/tyk-ai-studio-ent"
            dockerfile: "ci/Dockerfile.distroless"
          # Microgateway CE
          - component: microgateway
            edition: ce
            golang_cross: 1.25-bullseye
            goreleaser: "ci/goreleaser/goreleaser-microgateway.yml"
            goflags: ""
            cgo: 1
            rpmvers: "el/7 el/8 el/9 amazon/2 amazon/2023"
            debvers: "ubuntu/xenial ubuntu/bionic ubuntu/focal ubuntu/jammy ubuntu/noble debian/jessie debian/buster debian/bullseye debian/bookworm"
            pc_repo: "tyk/tyk-microgateway"
            docker_image: "tykio/tyk-microgateway"
            dockerfile: "ci/Dockerfile.microgateway.distroless"
          # Microgateway ENT
          - component: microgateway
            edition: ent
            golang_cross: 1.25-bullseye
            goreleaser: "ci/goreleaser/goreleaser-microgateway.yml"
            goflags: "-tags=enterprise"
            cgo: 1
            rpmvers: "el/7 el/8 el/9 amazon/2 amazon/2023"
            debvers: "ubuntu/xenial ubuntu/bionic ubuntu/focal ubuntu/jammy ubuntu/noble debian/jessie debian/buster debian/bullseye debian/bookworm"
            pc_repo: "tyk/tyk-ee-unstable"
            docker_image: "tykio/tyk-microgateway-ent"
            dockerfile: "ci/Dockerfile.microgateway.distroless"
    outputs:
      tags: ${{ steps.tag_metadata.outputs.tags }}
      commit_author: ${{ steps.set_outputs.outputs.commit_author}}
    steps:
      -
        name: Checkout of midsommar
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: midsommar

      -
        name: Checkout enterprise submodule
        if: matrix.edition == 'ent'
        uses: actions/checkout@v4
        with:
          repository: TykTechnologies/ai-studio-enterprise
          path: midsommar/enterprise
          token: ${{ secrets.ORG_GH_TOKEN }}

      -
        name: Checkout langchaingo repository
        uses: actions/checkout@v3
        with:
          repository: lonelycode/langchaingo
          path: langchaingo
          fetch-depth: 2

      -
        name: Set some outputs for later
        id: set_outputs
        shell: bash
        env:
          HEAD_REF: ${{github.head_ref}}
        run: |
          echo "commit_author=$(git show -s --format='%ae' HEAD)" >> $GITHUB_OUTPUT
          echo "branch=${HEAD_REF##*/}" >> $GITHUB_OUTPUT
      -
        uses: docker/setup-qemu-action@v3
      -
        uses: docker/setup-buildx-action@v3
      -
        name: Login to DockerHub
        if: startsWith(github.ref, 'refs/tags')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      -
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ matrix.component }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.component }}-
            ${{ runner.os }}-go-

      -
        name: Use Node.js
        if: matrix.component == 'studio'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      -
        name: Build UI
        if: matrix.component == 'studio'
        run: |
          cd ui/admin-frontend
          echo "Installing dependencies..."
          npm ci
          echo "Building UI..."
          PUBLIC_URL="/" REACT_APP_API_URL="" CI=false npm run build
          echo "Checking build output..."
          ls -la build
          echo "Checking static directory..."
          ls -la build/static
          echo "Checking index.html..."
          cat build/index.html | head -n 5
          echo "Verifying static files..."
          find build -type f
          cd ../..

      -
        name: Remove enterprise module references for CE builds
        if: matrix.edition == 'ce'
        run: |
          sed -i '/github.com\/TykTechnologies\/midsommar\/v2\/enterprise/d' go.mod

      -
        name: Build
        env:
          NFPM_PASSPHRASE: ${{ secrets.SIGNING_KEY_PASSPHRASE }}
          PKG_SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          PACKAGECLOUD_TOKEN: ${{ secrets.PACKAGECLOUD_TOKEN }}
        run: |
          pwd
          ls
          echo '#!/bin/sh
          ci/bin/unlock-agent.sh
          git config --global url."https://${{ secrets.ORG_GH_TOKEN }}@github.com".insteadOf "https://github.com"
          git config --global --add safe.directory /go/src/github.com/TykTechnologies/midsommar
          goreleaser release --clean -f ${{ matrix.goreleaser }} ${{ !startsWith(github.ref, 'refs/tags/') && ' --snapshot --skip=sign' || '' }}' | tee /tmp/build.sh
          chmod +x /tmp/build.sh
          pwd
          docker run --rm --privileged -e GITHUB_TOKEN=${{ github.token }} \
          -e GOPRIVATE=github.com/TykTechnologies                                \
          -e GOFLAGS='${{ matrix.goflags }}'                              \
          -e DEBVERS='${{ matrix.debvers }}'                               \
          -e RPMVERS='${{ matrix.rpmvers }}'                               \
          -e CGO_ENABLED=${{ matrix.cgo }}                                 \
          -e NFPM_PASSPHRASE="$NFPM_PASSPHRASE"                          \
          -e GPG_FINGERPRINT=12B5D62C28F57592D1575BD51ED14C59E37DAC20            \
          -e PKG_SIGNING_KEY="$PKG_SIGNING_KEY"                                  \
          -e PACKAGECLOUD_TOKEN=$PACKAGECLOUD_TOKEN                              \
          -e PACKAGECLOUD_REPO='${{ matrix.pc_repo }}'                    \
          -v ${{github.workspace}}/midsommar:/go/src/github.com/TykTechnologies/midsommar \
          -v /var/run/docker.sock:/var/run/docker.sock                           \
          -v ~/.docker/config.json:/root/.docker/config.json                     \
          -e GOCACHE=/cache/go-build                                             \
          -e GOMODCACHE=/go/pkg/mod                                              \
          -v ~/go/pkg/mod:/go/pkg/mod                                            \
          -v ~/.cache/go-build:/cache/go-build                                   \
          -v /tmp/build.sh:/tmp/build.sh                                         \
          -w /go/src/github.com/TykTechnologies/midsommar                      \
          tykio/golang-cross:${{ matrix.golang_cross }} /tmp/build.sh
      -
        name: Docker metadata for tag push
        id: tag_metadata
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ matrix.docker_image }}
          flavor: |
            latest=false
            prefix=v
          tags: |
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{version}}
          labels: "org.opencontainers.image.title=${{ matrix.component }} (${{ matrix.edition }})\norg.opencontainers.image.description=Tyk AI ${{ matrix.component == 'studio' && 'Studio' || 'Microgateway' }} (${{ matrix.edition }})\norg.opencontainers.image.vendor=tyk.io\norg.opencontainers.image.version=${{ github.ref_name }}\n"
      -
        name: push image to prod
        uses: docker/build-push-action@v6
        with:
          context: "midsommar/dist"
          platforms: linux/amd64,linux/arm64
          file: midsommar/${{ matrix.dockerfile }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: ${{ startsWith(github.ref, 'refs/tags') }}
          tags: ${{ steps.tag_metadata.outputs.tags }}
          labels: ${{ steps.tag_metadata.outputs.labels }}
      -
        name: save deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.component }}-${{ matrix.edition }}
          retention-days: 1
          path: |
            dist/*.deb
            !dist/*PAYG*.deb
            !dist/*fips*.deb
      -
        name: save rpm
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.component }}-${{ matrix.edition }}
          retention-days: 1
          path: |
            dist/*.rpm
            !dist/*PAYG*.rpm
            !dist/*fips*.rpm
  sbom:
    needs: goreleaser
    uses: TykTechnologies/github-actions/.github/workflows/sbom.yaml@main
    secrets:
      DEPDASH_URL: ${{ secrets.DEPDASH_URL }}
      DEPDASH_KEY: ${{ secrets.DEPDASH_KEY }}
      ORG_GH_TOKEN: ${{ secrets.ORG_GH_TOKEN }}
