syntax = "proto3";

package plugin;

option go_package = "github.com/TykTechnologies/midsommar/v2/proto";

// PluginService defines the gRPC interface for plugin communication
service PluginService {
    // Lifecycle management
    rpc Initialize(InitRequest) returns (InitResponse);
    rpc Ping(PingRequest) returns (PingResponse);
    rpc Shutdown(ShutdownRequest) returns (ShutdownResponse);
    
    // Pre-auth hook
    rpc ProcessPreAuth(PluginRequest) returns (PluginResponse);
    
    // Auth hook
    rpc Authenticate(AuthRequest) returns (AuthResponse);
    
    // Auth context methods (for auth plugins only)
    rpc GetAppByCredential(GetAppRequest) returns (GetAppResponse);
    rpc GetUserByCredential(GetUserRequest) returns (GetUserResponse);
    
    // Post-auth hook
    rpc ProcessPostAuth(EnrichedRequest) returns (PluginResponse);
    
    // Response hooks (new clean interface)
    rpc OnBeforeWriteHeaders(HeadersRequest) returns (HeadersResponse);
    rpc OnBeforeWrite(ResponseWriteRequest) returns (ResponseWriteResponse);

    // Streaming response hook - called after a streaming response completes
    rpc OnStreamComplete(StreamCompleteRequest) returns (StreamCompleteResponse);
    
    // Data collection hooks
    rpc HandleProxyLog(ProxyLogRequest) returns (DataCollectionResponse);
    rpc HandleAnalytics(AnalyticsRequest) returns (DataCollectionResponse);
    rpc HandleBudgetUsage(BudgetUsageRequest) returns (DataCollectionResponse);

    // AI Studio UI Asset serving (for AI Studio plugins only)
    rpc GetAsset(GetAssetRequest) returns (GetAssetResponse);
    rpc ListAssets(ListAssetsRequest) returns (ListAssetsResponse);
    rpc GetManifest(GetManifestRequest) returns (GetManifestResponse);

    // Generic RPC call method (for AI Studio plugins)
    rpc Call(CallRequest) returns (CallResponse);

    // Portal RPC call method (for portal-facing plugin endpoints)
    // Separate from Call to enforce security boundary between admin and portal contexts
    rpc PortalCall(PortalCallRequest) returns (PortalCallResponse);

    // Configuration schema method (for both systems)
    rpc GetConfigSchema(GetConfigSchemaRequest) returns (GetConfigSchemaResponse);

    // Agent Plugin Methods
    rpc HandleAgentMessage(AgentMessageRequest) returns (stream AgentMessageChunk);

    // Object Hook Methods (for AI Studio plugins)
    rpc GetObjectHookRegistrations(GetObjectHookRegistrationsRequest) returns (GetObjectHookRegistrationsResponse);
    rpc HandleObjectHook(ObjectHookRequest) returns (ObjectHookResponse);

    // Scheduler Methods (for AI Studio plugins)
    rpc ExecuteScheduledTask(ExecuteScheduledTaskRequest) returns (ExecuteScheduledTaskResponse);

    // Edge Payload Methods (for plugins that receive data from edge instances)
    // Called when an edge plugin sends data via SendToControl
    rpc AcceptEdgePayload(EdgePayloadRequest) returns (EdgePayloadResponse);

    // Custom Endpoint Methods — plugins serve custom HTTP endpoints under /plugins/{slug}/
    rpc GetEndpointRegistrations(GetEndpointRegistrationsRequest) returns (GetEndpointRegistrationsResponse);
    rpc HandleEndpointRequest(EndpointRequest) returns (EndpointResponse);
    rpc HandleEndpointRequestStream(EndpointRequest) returns (stream EndpointResponseChunk);

    // Resource Provider Methods — plugins register custom resource types for Apps
    rpc GetResourceTypeRegistrations(GetResourceTypeRegistrationsRequest) returns (GetResourceTypeRegistrationsResponse);
    rpc ListResourceInstances(ListResourceInstancesRequest) returns (ListResourceInstancesResponse);
    rpc GetResourceInstance(GetResourceInstanceRequest) returns (GetResourceInstanceResponse);
    rpc ValidateResourceSelection(ValidateResourceSelectionRequest) returns (ValidateResourceSelectionResponse);
    rpc CreateResourceInstance(CreateResourceInstanceRequest) returns (CreateResourceInstanceResponse);

    // Session management for long-lived broker access
    // OpenSession blocks until timeout or CloseSession is called, keeping the broker alive
    // Host should call this in a loop after Initialize() to maintain broker connectivity
    rpc OpenSession(OpenSessionRequest) returns (OpenSessionResponse);
    rpc CloseSession(CloseSessionRequest) returns (CloseSessionResponse);
}

// Common messages

message InitRequest {
    map<string, string> config = 1;
}

message InitResponse {
    bool success = 1;
    string error_message = 2;
}

message PingRequest {
    int64 timestamp = 1;
}

message PingResponse {
    int64 timestamp = 1;
    bool healthy = 2;
}

message ShutdownRequest {
    int64 timeout_seconds = 1;
}

message ShutdownResponse {
    bool success = 1;
}

message PluginContext {
    string request_id = 1;
    string vendor = 2;
    uint32 llm_id = 3;
    string llm_slug = 4;
    uint32 app_id = 5;
    uint32 user_id = 6;
    map<string, string> metadata = 7;
    map<string, string> trace_context = 8;
}

message PluginRequest {
    string method = 1;
    string path = 2;
    map<string, string> headers = 3;
    bytes body = 4;
    PluginContext context = 5;
    string remote_addr = 6;
}

message PluginResponse {
    bool modified = 1;
    int32 status_code = 2;
    map<string, string> headers = 3;
    bytes body = 4;
    bool block = 5;  // Stop processing if true
    string error_message = 6;
    map<string, string> context_updates = 7;  // Updates to request context (e.g., upstream_override)
}

message AuthRequest {
    string credential = 1;
    string auth_type = 2;
    PluginRequest request = 3;
    PluginContext context = 4;
}

message AuthResponse {
    bool authenticated = 1;
    string user_id = 2;
    string app_id = 3;
    map<string, string> claims = 4;
    string error_message = 5;
}

message EnrichedRequest {
    PluginRequest request = 1;
    string user_id = 2;
    string app_id = 3;
    map<string, string> auth_claims = 4;
    bool authenticated = 5;
}

message HeadersRequest {
    map<string, string> headers = 1;
    PluginContext context = 2;
}

message HeadersResponse {
    bool modified = 1;
    map<string, string> headers = 2;
}

message ResponseWriteRequest {
    bytes body = 1;
    map<string, string> headers = 2;
    bool is_stream_chunk = 3;
    PluginContext context = 4;
}

message ResponseWriteResponse {
    bool modified = 1;
    bytes body = 2;
    map<string, string> headers = 3;
}

// Streaming response hook messages - for caching/processing complete streaming responses
message StreamCompleteRequest {
    bytes accumulated_response = 1;      // Full SSE response (all chunks concatenated)
    map<string, string> headers = 2;     // Response headers from upstream
    int32 status_code = 3;               // HTTP status code
    PluginContext context = 4;           // Plugin context with request metadata
    int32 chunk_count = 5;               // Number of chunks received
    bytes request_body = 6;              // Original request body (for cache key generation)
}

message StreamCompleteResponse {
    bool handled = 1;                    // Plugin processed the response
    bool cached = 2;                     // Response was cached (for metrics/logging)
    string error_message = 3;            // Error description if any
}

// Auth plugin context methods

message GetAppRequest {
    string credential = 1;
    PluginContext context = 2;
}

message GetAppResponse {
    bool success = 1;
    string error_message = 2;
    App app = 3;
}

message GetUserRequest {
    string credential = 1;
    PluginContext context = 2;
}

message GetUserResponse {
    bool success = 1;
    string error_message = 2;
    User user = 3;
}

message App {
    uint32 id = 1;
    string name = 2;
    string description = 3;
    string owner_email = 4;
    bool is_active = 5;
    double monthly_budget = 6;
    int32 rate_limit = 7;
    map<string, string> metadata = 8;
    repeated AppPluginResourceAssociation plugin_resources = 9;
}

// AppPluginResourceAssociation carries plugin resource bindings on the App proto.
// This is populated by the gateway router so CustomEndpointHandler plugins can
// access resource associations directly from EndpointRequest.App without
// parsing metadata workarounds.
message AppPluginResourceAssociation {
    uint32 plugin_id = 1;
    string resource_type_slug = 2;
    repeated string instance_ids = 3;
    repeated AppPluginResourceInstance instances = 4;
}

// AppPluginResourceInstance carries instance details on the App proto
// so gateway plugins can access resource metadata without calling back to Studio.
message AppPluginResourceInstance {
    string id = 1;
    string name = 2;
    int32 privacy_score = 3;
    bytes metadata = 4;
}

message User {
    uint32 id = 1;
    string email = 2;
    string name = 3;
    bool is_active = 4;
    map<string, string> metadata = 5;
}

// Data collection messages

message ProxyLogRequest {
    uint32 app_id = 1;
    uint32 user_id = 2;
    string vendor = 3;
    bytes request_body = 4;
    bytes response_body = 5;
    int32 response_code = 6;
    int64 timestamp = 7;  // Unix timestamp in seconds
    string request_id = 8;
    PluginContext context = 9;
}

message AnalyticsRequest {
    uint32 llm_id = 1;
    string model_name = 2;
    string vendor = 3;
    int32 prompt_tokens = 4;
    int32 response_tokens = 5;
    int32 cache_write_prompt_tokens = 6;
    int32 cache_read_prompt_tokens = 7;
    int32 total_tokens = 8;
    double cost = 9;
    string currency = 10;
    uint32 app_id = 11;
    uint32 user_id = 12;
    int64 timestamp = 13;  // Unix timestamp in seconds
    int32 tool_calls = 14;
    int32 choices = 15;
    string request_id = 16;
    PluginContext context = 17;
}

message BudgetUsageRequest {
    uint32 app_id = 1;
    uint32 llm_id = 2;
    int64 tokens_used = 3;
    double cost = 4;
    int32 requests_count = 5;
    int64 prompt_tokens = 6;
    int64 completion_tokens = 7;
    int64 period_start = 8;  // Unix timestamp in seconds
    int64 period_end = 9;    // Unix timestamp in seconds
    int64 timestamp = 10;    // Unix timestamp in seconds
    string request_id = 11;
    PluginContext context = 12;
}

message DataCollectionResponse {
    bool success = 1;
    bool handled = 2;
    string error_message = 3;
    map<string, string> metadata = 4;
}

// AI Studio UI Asset serving messages

message GetAssetRequest {
    string asset_path = 1;  // Relative path to asset (e.g., "ui/webc/dashboard.js")
}

message GetAssetResponse {
    bool success = 1;
    bytes content = 2;      // Asset file content
    string mime_type = 3;   // MIME type (e.g., "application/javascript")
    string error_message = 4;
    int64 content_length = 5;
}

message ListAssetsRequest {
    string path_prefix = 1; // Optional filter (e.g., "ui/")
}

message ListAssetsResponse {
    bool success = 1;
    repeated AssetInfo assets = 2;
    string error_message = 3;
}

message AssetInfo {
    string path = 1;        // Asset path
    string mime_type = 2;   // MIME type
    int64 size = 3;         // File size in bytes
}

message GetManifestRequest {
    // No parameters needed - each plugin has one manifest
}

message GetManifestResponse {
    bool success = 1;
    string manifest_json = 2;  // Complete manifest as JSON string
    string error_message = 3;
}

// Generic RPC call messages (for AI Studio plugins)
message CallRequest {
    string method = 1;   // RPC method name (e.g., "get_statistics")
    string payload = 2;  // JSON payload as string
    uint32 service_broker_id = 3;  // Broker ID for service API access during RPC
}

message CallResponse {
    bool success = 1;
    string data = 2;          // JSON response data as string
    string error_message = 3;
}

// Portal RPC call messages (for portal-facing plugin endpoints)
// These are separate from Call/CallResponse to enforce security boundaries
// between admin UI and portal UI plugin interactions.
message PortalCallRequest {
    string method = 1;                       // RPC method name (e.g., "submit_feedback", "get_user_data")
    string payload = 2;                      // JSON payload as string
    uint32 service_broker_id = 3;            // Broker ID for service API access during RPC
    PortalUserContext user_context = 4;      // Authenticated portal user info
}

message PortalCallResponse {
    bool success = 1;
    string data = 2;                         // JSON response data as string
    string error_message = 3;
}

// PortalUserContext provides information about the authenticated portal user
// This is passed to plugins on portal RPC calls so they can make authorization decisions
message PortalUserContext {
    uint32 user_id = 1;
    string email = 2;
    string name = 3;
    bool is_admin = 4;
    repeated string groups = 5;              // Group names the user belongs to
    map<string, string> metadata = 6;        // Additional user metadata
}

// Configuration schema messages
message GetConfigSchemaRequest {
    // Empty - each plugin returns its own configuration schema
}

message GetConfigSchemaResponse {
    bool success = 1;
    string schema_json = 2;    // JSON Schema as string (jsonschema.org format)
    string error_message = 3;
}

// Agent Plugin Messages

message AgentMessageRequest {
    string session_id = 1;
    string user_message = 2;
    repeated AgentToolInfo available_tools = 3;
    repeated AgentDatasourceInfo available_datasources = 4;
    repeated AgentLLMInfo available_llms = 5;
    string config_json = 6;                      // Plugin configuration from AgentConfig
    repeated AgentConversationMessage history = 7;
    PluginContext context = 8;
    uint32 service_broker_id = 9;                // Broker ID for service API access during agent calls
}

message AgentMessageChunk {
    enum ChunkType {
        CONTENT = 0;         // Regular content chunk
        TOOL_CALL = 1;       // Tool call being made
        TOOL_RESULT = 2;     // Tool execution result
        THINKING = 3;        // Agent reasoning/planning
        ERROR = 4;           // Error occurred
        DONE = 5;            // Processing complete
    }

    ChunkType type = 1;
    string content = 2;          // Text content
    string metadata_json = 3;    // Additional metadata as JSON
    bool is_final = 4;           // True if this is the final chunk
}

message AgentToolInfo {
    uint32 id = 1;
    string name = 2;
    string slug = 3;
    string description = 4;
    repeated string operations = 5;  // Available operation IDs
    int32 privacy_score = 6;
}

message AgentDatasourceInfo {
    uint32 id = 1;
    string name = 2;
    string description = 3;
    string db_source_type = 4;
    int32 privacy_score = 5;
}

message AgentLLMInfo {
    uint32 id = 1;
    string name = 2;
    string vendor = 3;
    string default_model = 4;
    repeated string allowed_models = 5;
    int32 privacy_score = 6;
}

message AgentConversationMessage {
    string role = 1;             // "user", "assistant", "system"
    string content = 2;
    int64 timestamp = 3;         // Unix timestamp
    string metadata_json = 4;    // Additional metadata as JSON
}

// Object Hook Messages

message GetObjectHookRegistrationsRequest {
    // Empty - plugin returns its registrations
}

message GetObjectHookRegistrationsResponse {
    repeated ObjectHookRegistration registrations = 1;
}

message ObjectHookRegistration {
    string object_type = 1;  // "llm", "datasource", "tool", "user"
    repeated string hook_types = 2;  // e.g., "before_create", "after_update", "before_delete"
    int32 priority = 3;  // Execution order (lower = earlier)
}

message ObjectHookRequest {
    string hook_type = 1;        // "before_create", "after_create", "before_update", "after_update", "before_delete", "after_delete"
    string object_type = 2;       // "llm", "datasource", "tool", "user"
    string operation_id = 3;      // Unique ID for this operation (for correlation)
    uint32 user_id = 4;           // User performing the operation
    uint32 plugin_id = 5;         // Plugin being invoked
    PluginContext context = 6;    // Plugin context with metadata

    // The object being modified/created/deleted (JSON encoded)
    string object_json = 10;      // JSON representation of the object

    // Additional context about the operation
    map<string, string> metadata = 20;
    int64 timestamp = 21;         // Unix timestamp
}

message ObjectHookResponse {
    bool allow_operation = 1;     // Whether to proceed with operation (for "before_*" hooks)
    string rejection_reason = 2;   // If not allowed, why (shown to user)

    // Modified object (JSON encoded)
    string modified_object_json = 10;  // JSON representation if plugin modified the object

    // Plugin-specific metadata to store with the object
    map<string, string> plugin_metadata = 20;

    // Additional response metadata
    string message = 30;  // Optional message to log
    bool modified = 31;   // Whether the plugin modified the object
}

// Scheduler Messages

message ExecuteScheduledTaskRequest {
    PluginContext context = 1;           // Plugin context (with synthetic request ID)
    ScheduleDefinition schedule = 2;     // Schedule definition
    uint32 service_broker_id = 3;        // Broker ID for service API access during execution
}

message ExecuteScheduledTaskResponse {
    bool success = 1;
    string error_message = 2;
}

message ScheduleDefinition {
    string id = 1;                       // Schedule ID from manifest
    string name = 2;                     // Human-readable name
    string cron = 3;                     // Cron expression
    string timezone = 4;                 // Timezone for cron evaluation
    bool enabled = 5;                    // Whether schedule is enabled
    int32 timeout_seconds = 6;           // Maximum execution time
    string config_json = 7;              // Schedule config as JSON string
}

// Edge Payload Messages
// These enable plugins on the control plane to receive data from edge instances

// EdgePayloadRequest is sent to a plugin when data arrives from an edge instance
// via the SendToControl mechanism
message EdgePayloadRequest {
    bytes payload = 1;                           // The arbitrary payload data from edge
    string edge_id = 2;                          // Edge instance that sent this payload
    string edge_namespace = 3;                   // Edge namespace
    string correlation_id = 4;                   // Optional correlation ID for tracking
    map<string, string> metadata = 5;            // Optional key-value metadata from edge
    int64 edge_timestamp = 6;                    // Unix timestamp when generated at edge
    int64 received_timestamp = 7;                // Unix timestamp when received at control
    PluginContext context = 8;                   // Plugin context
    uint32 service_broker_id = 9;                // Broker ID for service API access
}

// EdgePayloadResponse is returned by the plugin after processing edge payload
message EdgePayloadResponse {
    bool success = 1;                            // Whether processing succeeded
    bool handled = 2;                            // Whether plugin actually processed this payload
    string error_message = 3;                    // Error description if success=false
    map<string, string> metadata = 4;            // Optional response metadata
}

// Session Management Messages
// These enable long-lived broker connections for plugins that need background services

// OpenSessionRequest is sent to a plugin to establish a long-lived broker session
// The plugin should block until timeout or CloseSession is called
message OpenSessionRequest {
    uint32 service_broker_id = 1;                // Broker ID where host services are registered
    uint32 plugin_id = 2;                        // Plugin ID for tracking
    map<string, string> metadata = 3;            // Optional metadata (edge_id, etc.)
    int32 timeout_ms = 4;                        // Session timeout in ms (default: 30000)
}

// OpenSessionResponse is returned when the session ends (timeout or explicit close)
message OpenSessionResponse {
    bool success = 1;
    string error_message = 2;
    string session_id = 3;                       // Session ID generated by plugin

    enum CloseReason {
        UNKNOWN = 0;
        TIMEOUT = 1;                             // Normal timeout, host should re-open
        EXPLICIT_CLOSE = 2;                      // CloseSession was called
        PLUGIN_ERROR = 3;                        // Plugin encountered an error
    }
    CloseReason close_reason = 4;
}

// CloseSessionRequest is sent to explicitly close a session before timeout
message CloseSessionRequest {
    string reason = 1;                           // Reason for closing (e.g., "shutdown", "unload")
}

// CloseSessionResponse confirms session closure
message CloseSessionResponse {
    bool success = 1;
    string error_message = 2;
}

// --- Custom Endpoint Messages ---
// These enable plugins to register and serve custom HTTP endpoints on the gateway

message GetEndpointRegistrationsRequest {
    // Empty - plugin returns its endpoint registrations
}

message GetEndpointRegistrationsResponse {
    repeated EndpointRegistration registrations = 1;
}

message EndpointRegistration {
    string path = 1;                     // Relative path (e.g., "/*", "/.well-known/openid-configuration")
    repeated string methods = 2;         // HTTP methods: GET, POST, PUT, DELETE, PATCH, OPTIONS, HEAD
    string description = 3;              // Human-readable description
    bool require_auth = 4;               // Whether the gateway should enforce auth before forwarding
    bool stream_response = 5;            // If true, gateway uses HandleEndpointRequestStream (SSE)
    map<string, string> metadata = 6;    // Plugin-defined metadata
}

// EndpointRequest carries a full HTTP request to the plugin
message EndpointRequest {
    string method = 1;                   // HTTP method
    string path = 2;                     // Full request path (/plugins/{slug}/users/123/profile)
    string relative_path = 3;            // Path relative to plugin mount (/users/123/profile)
    repeated string path_segments = 4;   // Pre-split relative path segments: ["users", "123", "profile"]
    map<string, string> headers = 5;     // Request headers
    bytes body = 6;                      // Request body
    string query_string = 7;             // Raw query string
    string remote_addr = 8;              // Client IP
    string host = 9;                     // Request Host header
    string protocol = 10;                // "http" (future: "websocket", "sse")
    PluginContext context = 11;          // Request ID, metadata

    // Auth context (populated when require_auth=true and token is valid)
    bool authenticated = 12;             // Whether request was authenticated
    App app = 13;                        // Full App object (ID, name, metadata, etc.)
    repeated string scopes = 14;         // Token scopes
}

// EndpointResponse — unary response for non-streaming endpoints
message EndpointResponse {
    int32 status_code = 1;               // HTTP status code
    map<string, string> headers = 2;     // Response headers
    bytes body = 3;                      // Response body
    string error_message = 4;            // Error (empty on success)
}

// EndpointResponseChunk — streaming response for SSE/streaming endpoints
// Protocol: HEADERS (first) → BODY* (zero or more) → DONE (final)
message EndpointResponseChunk {
    enum ChunkType {
        HEADERS = 0;    // First chunk: status code + headers (no body)
        BODY = 1;       // Body data chunk (may be sent multiple times)
        DONE = 2;       // Stream complete signal
        ERROR = 3;      // Error during streaming
    }
    ChunkType type = 1;
    int32 status_code = 2;               // Set on HEADERS chunk
    map<string, string> headers = 3;     // Set on HEADERS chunk
    bytes data = 4;                      // Set on BODY chunks (raw bytes to flush)
    string error_message = 5;            // Set on ERROR chunk
}

// --- Resource Provider Messages ---
// These enable plugins to register custom resource types that can be
// associated with Apps and participate in privacy validation.

message GetResourceTypeRegistrationsRequest {
    // Empty - plugin returns its resource type registrations
}

message GetResourceTypeRegistrationsResponse {
    repeated ResourceTypeRegistrationProto registrations = 1;
}

message ResourceTypeRegistrationProto {
    string slug = 1;                     // Machine-readable identifier (unique per plugin)
    string name = 2;                     // Human-readable display name
    string description = 3;              // Description of this resource type
    string icon = 4;                     // Material icon name or asset path
    bool has_privacy_score = 5;          // Whether instances carry privacy scores
    bool supports_submissions = 6;       // Whether community submissions are supported
    ResourceFormComponentProto form_component = 7;  // Optional custom form component
}

message ResourceFormComponentProto {
    string tag = 1;                      // Web Component custom element tag
    string entry_point = 2;              // JS asset path relative to plugin root
}

message ListResourceInstancesRequest {
    string resource_type_slug = 1;       // Which resource type to list instances for
    PluginContext context = 2;
    uint32 service_broker_id = 3;
}

message ListResourceInstancesResponse {
    bool success = 1;
    repeated ResourceInstanceProto instances = 2;
    string error_message = 3;
}

message ResourceInstanceProto {
    string id = 1;                       // Plugin-assigned unique identifier
    string name = 2;                     // Human-readable display name
    string description = 3;              // Optional description
    int32 privacy_score = 4;             // 0-100 (only meaningful if type has privacy)
    bytes metadata = 5;                  // Opaque JSON metadata
    bool is_active = 6;                  // Whether instance is currently usable
}

message GetResourceInstanceRequest {
    string resource_type_slug = 1;
    string instance_id = 2;
    PluginContext context = 3;
    uint32 service_broker_id = 4;
}

message GetResourceInstanceResponse {
    bool success = 1;
    ResourceInstanceProto instance = 2;
    string error_message = 3;
}

message ValidateResourceSelectionRequest {
    string resource_type_slug = 1;
    repeated string instance_ids = 2;
    uint32 app_id = 3;
    PluginContext context = 4;
    uint32 service_broker_id = 5;
}

message ValidateResourceSelectionResponse {
    bool valid = 1;
    string error_message = 2;
}

message CreateResourceInstanceRequest {
    string resource_type_slug = 1;
    bytes payload = 2;                   // JSON-encoded creation payload (plugin-defined schema)
    PluginContext context = 3;
    uint32 service_broker_id = 4;
}

message CreateResourceInstanceResponse {
    bool success = 1;
    ResourceInstanceProto instance = 2;
    string error_message = 3;
}