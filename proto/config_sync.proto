syntax = "proto3";

package microgateway;

import "proto/common.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/TykTechnologies/midsommar/v2/proto";

// ConfigurationSyncService defines the gRPC service for hub-and-spoke configuration synchronization
service ConfigurationSyncService {
  // RegisterEdge registers an edge instance with the control instance
  rpc RegisterEdge(EdgeRegistrationRequest) returns (EdgeRegistrationResponse);
  
  // GetFullConfiguration retrieves a complete configuration snapshot for an edge
  rpc GetFullConfiguration(ConfigurationRequest) returns (ConfigurationSnapshot);
  
  // SubscribeToChanges establishes a bidirectional stream for real-time configuration updates
  rpc SubscribeToChanges(stream EdgeMessage) returns (stream ControlMessage);
  
  // SendHeartbeat sends periodic health status updates
  rpc SendHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  
  // UnregisterEdge unregisters an edge instance
  rpc UnregisterEdge(EdgeUnregistrationRequest) returns (google.protobuf.Empty);
  
  // ValidateToken validates an API token on-demand (NEW)
  rpc ValidateToken(TokenValidationRequest) returns (TokenValidationResponse);

  // SendAnalyticsPulse sends batched analytics data from edge to control (NEW)
  rpc SendAnalyticsPulse(AnalyticsPulse) returns (AnalyticsPulseResponse);

  // SendPluginControlBatch sends batched plugin control payloads from edge to control
  // This allows plugins running on edge instances to send arbitrary data back to control
  rpc SendPluginControlBatch(PluginControlBatch) returns (PluginControlBatchResponse);
}

// EdgeRegistrationRequest is sent when an edge instance connects
message EdgeRegistrationRequest {
  string edge_id = 1;          // Unique identifier for this edge instance
  string edge_namespace = 2;   // Namespace this edge serves (empty = global only)
  string version = 3;          // Microgateway version
  string build_hash = 4;       // Build hash for version checking
  map<string, string> metadata = 5; // Additional edge metadata (region, environment, etc.)
  HealthStatus health = 6;     // Initial health status
}

// EdgeRegistrationResponse is returned after successful registration
message EdgeRegistrationResponse {
  bool success = 1;
  string message = 2;
  string session_id = 3;       // Session ID for this connection
  ConfigurationSnapshot initial_config = 4; // Initial configuration snapshot
}

// ConfigurationRequest requests configuration for a specific namespace
message ConfigurationRequest {
  string edge_namespace = 1;   // Namespace to filter for (empty = global only)
  google.protobuf.Timestamp last_sync_time = 2; // Optional: only get changes since this time
}

// EdgeMessage is sent from edge to control
message EdgeMessage {
  oneof message {
    EdgeRegistrationRequest registration = 1;
    HeartbeatRequest heartbeat = 2;
    ConfigurationRequest config_request = 3;
    EdgeUnregistrationRequest unregistration = 4;
    ConfigurationReloadResponse reload_response = 5; // NEW: Reload status reporting
  }
}

// ControlMessage is sent from control to edge
message ControlMessage {
  oneof message {
    EdgeRegistrationResponse registration_response = 1;
    ConfigurationSnapshot configuration = 2;
    ConfigurationChange change = 3;
    HeartbeatResponse heartbeat_response = 4;
    ErrorMessage error = 5;
    ConfigurationReloadRequest reload_request = 6; // NEW: Initiate reload
  }
}

// HeartbeatRequest contains health and status information from edge
message HeartbeatRequest {
  string edge_id = 1;
  string session_id = 2;
  HealthStatus health = 3;
  EdgeMetrics metrics = 4;
  google.protobuf.Timestamp timestamp = 5;
}

// HeartbeatResponse acknowledges heartbeat and may contain control directives
message HeartbeatResponse {
  bool acknowledged = 1;
  string message = 2;
  // Control directives (if any)
  bool request_full_sync = 3;  // Request edge to perform full configuration sync
  bool shutdown_requested = 4; // Request graceful shutdown
}

// EdgeUnregistrationRequest is sent when edge is shutting down
message EdgeUnregistrationRequest {
  string edge_id = 1;
  string session_id = 2;
  string reason = 3; // Shutdown reason
}

// EdgeMetrics contains operational metrics from edge instance
message EdgeMetrics {
  uint64 requests_processed = 1;    // Total requests processed
  uint64 active_connections = 2;    // Current active connections
  double cpu_usage_percent = 3;     // CPU usage percentage
  uint64 memory_usage_bytes = 4;    // Memory usage in bytes
  uint64 uptime_seconds = 5;        // Uptime in seconds
  map<string, double> custom_metrics = 6; // Custom metrics
}

// ErrorMessage represents an error from control to edge
message ErrorMessage {
  string code = 1;        // Error code
  string message = 2;     // Human readable error message
  bool fatal = 3;         // Whether this error requires edge restart
}

// Authentication and authorization messages
message AuthenticationRequest {
  string token = 1;       // Authentication token
  string edge_id = 2;     // Edge instance ID
  string challenge = 3;   // Optional challenge for enhanced security
}

message AuthenticationResponse {
  bool authenticated = 1;
  string message = 2;
  string session_token = 3; // Session token for subsequent requests
  int64 expires_at = 4;     // Session expiration timestamp
}

// Token validation messages for on-demand validation (NEW)
message TokenValidationRequest {
  string token = 1;       // The API token to validate
  string edge_id = 2;     // Edge ID making the request
  string edge_namespace = 3; // Edge namespace for filtering
}

message TokenValidationResponse {
  bool valid = 1;           // Whether token is valid
  uint32 app_id = 2;        // App ID if valid (0 if invalid)
  string app_name = 3;      // App name for logging
  repeated string scopes = 4; // Token scopes if valid
  string error_message = 5; // Error message if invalid
  google.protobuf.Timestamp expires_at = 6; // Token expiration
  uint32 user_id = 7;       // Owner user ID for analytics tracking
}

// Distributed configuration reload messages (NEW)
message ConfigurationReloadRequest {
  string operation_id = 1;        // Unique operation ID for tracking
  string target_namespace = 2;    // Namespace to reload ("" = all)
  repeated string target_edges = 3; // Specific edge IDs (empty = all in namespace)
  string initiated_by = 4;        // CLI user/admin who initiated
  int64 timeout_seconds = 5;      // Operation timeout
  google.protobuf.Timestamp initiated_at = 6; // When reload was initiated
}

message ConfigurationReloadResponse {
  string operation_id = 1;        // Operation ID from request
  string edge_id = 2;             // Edge reporting status
  ReloadPhase phase = 3;          // Current reload phase
  bool success = 4;               // Success status (valid for READY/FAILED phases)
  string message = 5;             // Status message or error details
  string config_version_before = 6; // Config version before reload
  string config_version_after = 7;  // Config version after reload (if successful)
  google.protobuf.Timestamp timestamp = 8; // When this status was reported
}

enum ReloadPhase {
  PONG = 0;           // Edge acknowledges reload request
  PULL_STARTED = 1;   // Edge starts pulling new config
  UPDATING = 2;       // Edge applying new config to SQLite
  UPDATED = 3;        // Edge SQLite update complete
  READY = 4;          // Edge operational with new config
  FAILED = 5;         // Edge failed during reload
}

// Analytics Pulse System Messages (NEW)

// AnalyticsPulse contains batched analytics data from edge to control
message AnalyticsPulse {
  string edge_id = 1;             // Edge instance sending the pulse
  string edge_namespace = 2;      // Edge namespace
  google.protobuf.Timestamp pulse_timestamp = 3; // When pulse was generated
  google.protobuf.Timestamp data_from = 4;       // Start time of data in this pulse
  google.protobuf.Timestamp data_to = 5;         // End time of data in this pulse
  uint64 sequence_number = 6;     // Incremental sequence for ordering

  // Batched analytics data
  repeated AnalyticsEvent analytics_events = 7;   // Analytics/token usage events
  repeated BudgetUsageEvent budget_events = 8;    // Budget usage events
  repeated ProxyLogSummary proxy_summaries = 9;   // Summarized proxy logs (not full payloads)

  // Pulse metadata
  bool is_compressed = 10;        // Whether data is compressed
  uint32 total_records = 11;      // Total number of records in pulse
  uint64 data_size_bytes = 12;    // Uncompressed data size
}

// AnalyticsPulseResponse acknowledges receipt of analytics pulse
message AnalyticsPulseResponse {
  bool success = 1;               // Whether pulse was successfully processed
  string message = 2;             // Status message or error details
  uint64 processed_records = 3;   // Number of records successfully processed
  uint64 sequence_number = 4;     // Echo sequence number from request
  google.protobuf.Timestamp processed_at = 5; // When control processed the pulse

  // Pulse configuration updates (if any)
  AnalyticsPulseConfig updated_config = 6; // Updated pulse configuration
}

// AnalyticsPulseConfig configures pulse behavior for an edge
message AnalyticsPulseConfig {
  bool enabled = 1;               // Whether analytics pulse is enabled
  uint32 interval_seconds = 2;    // Pulse frequency in seconds (default: 300)
  uint32 max_batch_size = 3;      // Maximum records per pulse (default: 1000)
  bool compression_enabled = 4;   // Whether to compress pulse data (default: true)
  uint32 max_buffer_size = 5;     // Maximum edge buffer size (default: 10000)
  bool include_proxy_summaries = 6; // Whether to include proxy log summaries (default: true)

  // Data retention settings
  uint32 edge_retention_hours = 7; // How long edge keeps data after successful pulse (default: 24)
  repeated string excluded_vendors = 8; // Vendor patterns to exclude from pulses
}

// Individual analytics event for pulse batching
// Aligned with LLMChatRecord from AI Studio for analytics parity
message AnalyticsEvent {
  string request_id = 1;          // Unique request identifier
  uint32 app_id = 2;              // Application ID
  uint32 llm_id = 3;              // LLM ID (optional)
  uint32 user_id = 4;             // User ID who made the request
  string endpoint = 5;            // API endpoint called
  string method = 6;              // HTTP method
  int32 status_code = 7;          // Response status code

  // Fields matching LLMChatRecord for parity
  string model_name = 8;          // Model name (e.g., "gpt-4", "claude-3-opus")
  string vendor = 9;              // Vendor name (e.g., "anthropic", "openai")
  string interaction_type = 10;   // "chat" or "proxy"
  uint32 choices = 11;            // Number of choices in response
  uint32 tool_calls = 12;         // Number of tool calls made
  string chat_id = 13;            // Chat session identifier
  string currency = 14;           // Currency for cost (e.g., "USD")

  // Token tracking (matching LLMChatRecord naming)
  uint32 request_tokens = 15;     // Input tokens consumed (prompt_tokens)
  uint32 response_tokens = 16;    // Output tokens generated (response_tokens)
  uint32 total_tokens = 17;       // Total tokens used
  uint32 cache_write_prompt_tokens = 18;  // Cache creation/write tokens
  uint32 cache_read_prompt_tokens = 19;   // Cache read tokens

  // Cost and timing
  double cost = 20;               // Cost as cents (dollars * 10000, providing 4 decimal precision)
  uint32 latency_ms = 21;         // Request latency in milliseconds (total_time_ms)

  google.protobuf.Timestamp timestamp = 22; // When the event occurred
  string error_message = 23;      // Error message if failed (optional)

  // Optional request/response size summary (not full payloads)
  uint32 request_size_bytes = 24; // Size of request body
  uint32 response_size_bytes = 25; // Size of response body

  // Optional request/response data (controlled by include_request_response_data flag)
  string request_body = 26;       // Request body (if include_request_response_data = true)
  string response_body = 27;      // Response body (if include_request_response_data = true)
}

// Budget usage event for pulse batching
message BudgetUsageEvent {
  uint32 app_id = 1;              // Application ID
  uint32 llm_id = 2;              // LLM ID (optional, 0 if not specific)
  int64 tokens_used = 3;          // Tokens consumed in this event
  double cost = 4;                // Cost as cents (dollars * 10000, providing 4 decimal precision)
  int64 prompt_tokens = 5;        // Prompt tokens used
  int64 completion_tokens = 6;    // Completion tokens used
  uint32 requests_count = 7;      // Number of requests in this usage event
  google.protobuf.Timestamp timestamp = 8; // When the usage occurred
  google.protobuf.Timestamp period_start = 9; // Budget period start
  google.protobuf.Timestamp period_end = 10;   // Budget period end
}

// Summarized proxy log information (not full request/response)
message ProxyLogSummary {
  uint32 app_id = 1;              // Application ID
  uint32 user_id = 2;             // User ID
  string vendor = 3;              // LLM vendor
  int32 response_code = 4;        // HTTP response code
  uint32 request_count = 5;       // Number of requests in this summary
  uint64 total_request_bytes = 6; // Total bytes of all requests
  uint64 total_response_bytes = 7; // Total bytes of all responses
  uint32 avg_latency_ms = 8;      // Average latency across requests
  uint32 error_count = 9;         // Number of failed requests
  google.protobuf.Timestamp first_request = 10; // Timestamp of first request in summary
  google.protobuf.Timestamp last_request = 11;  // Timestamp of last request in summary

  // Request pattern summary
  repeated string unique_models = 12; // List of unique model names called
  uint32 total_tokens = 13;       // Total tokens across all requests
  double total_cost = 14;         // Total cost as cents (dollars * 10000, providing 4 decimal precision)
}

// Plugin Control Payload Messages
// These enable plugins running on edge instances to send arbitrary data back to control

// PluginControlPayload represents a single payload from an edge plugin to control
message PluginControlPayload {
  uint32 plugin_id = 1;                        // Numeric plugin ID (must match AI Studio plugin ID)
  bytes payload = 2;                           // Arbitrary payload data (max 1MB)
  string edge_id = 3;                          // Edge instance that generated this payload
  string edge_namespace = 4;                   // Edge namespace
  google.protobuf.Timestamp timestamp = 5;     // When payload was generated at edge
  string correlation_id = 6;                   // Optional correlation ID for tracking
  map<string, string> metadata = 7;            // Optional key-value metadata
}

// PluginControlBatch contains batched plugin control payloads from edge to control
message PluginControlBatch {
  string edge_id = 1;                          // Edge instance sending this batch
  string edge_namespace = 2;                   // Edge namespace
  repeated PluginControlPayload payloads = 3;  // Batched payloads
  uint64 sequence_number = 4;                  // Incremental sequence for ordering/deduplication
  google.protobuf.Timestamp batch_timestamp = 5; // When batch was generated
  uint32 total_payloads = 6;                   // Total number of payloads in this batch
}

// PluginControlBatchResponse acknowledges receipt of plugin control batch
message PluginControlBatchResponse {
  bool success = 1;                            // Overall success (true if all payloads processed)
  string message = 2;                          // Status message
  uint64 processed_count = 3;                  // Number of payloads successfully processed
  uint64 sequence_number = 4;                  // Echo sequence number for confirmation
  google.protobuf.Timestamp processed_at = 5;  // When control processed the batch
  repeated PluginPayloadError errors = 6;      // Per-payload errors if any
}

// PluginPayloadError represents an error processing a single payload
message PluginPayloadError {
  uint32 plugin_id = 1;                        // Plugin ID that failed
  string correlation_id = 2;                   // Correlation ID from the payload
  string error_message = 3;                    // Error description
}