syntax = "proto3";

package microgateway;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/TykTechnologies/midsommar/v2/proto";

// Common data structures for hub-and-spoke configuration synchronization

// LLMConfig represents an LLM configuration with embedded relationships
message LLMConfig {
  uint32 id = 1;
  string name = 2;
  string slug = 3;
  string vendor = 4;
  string endpoint = 5;
  string api_key_encrypted = 6;
  string default_model = 7;
  int32 max_tokens = 8;
  int32 timeout_seconds = 9;
  int32 retry_count = 10;
  bool is_active = 11;
  double monthly_budget = 12;
  int32 rate_limit_rpm = 13;
  string metadata = 14; // JSON string
  string allowed_models = 15; // JSON string
  string auth_mechanism = 16;
  string auth_config = 17; // JSON string
  string namespace = 18; // Namespace for filtering
  google.protobuf.Timestamp created_at = 19;
  google.protobuf.Timestamp updated_at = 20;
  
  // Embedded relationship data (from join tables)
  repeated uint32 app_ids = 21;     // From app_llms join table
  repeated uint32 filter_ids = 22;  // From llm_filters join table  
  repeated uint32 plugin_ids = 23;  // From llm_plugins join table
}

// AppConfig represents an application configuration with embedded relationships
message AppConfig {
  uint32 id = 1;
  string name = 2;
  string description = 3;
  string owner_email = 4;
  bool is_active = 5;
  double monthly_budget = 6;
  string budget_start_date = 7; // ISO timestamp
  int32 budget_reset_day = 8;
  int32 rate_limit_rpm = 9;
  string allowed_ips = 10; // JSON string
  string metadata = 11; // JSON string
  string namespace = 12; // Namespace for filtering
  uint32 user_id = 13; // Owner user ID (synced from control plane for analytics)
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;

  // Embedded relationship data (from join tables) - THE CRITICAL MISSING PIECE
  repeated uint32 llm_ids = 16;        // From app_llms join table - FOR LLM ACCESS VALIDATION
  repeated uint32 credential_ids = 17; // From credentials table
  repeated uint32 token_ids = 18;      // From api_tokens table
}

// TokenConfig represents an API token configuration
message TokenConfig {
  uint32 id = 1;
  string token = 2;
  string name = 3;
  uint32 app_id = 4;
  string scopes = 5; // JSON string
  bool is_active = 6;
  string expires_at = 7; // ISO timestamp (nullable)
  string last_used_at = 8; // ISO timestamp (nullable)
  string namespace = 9; // NEW: Namespace for filtering
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

// ModelPriceConfig represents model pricing information
message ModelPriceConfig {
  uint32 id = 1;
  string vendor = 2;
  string model_name = 3;
  double cpt = 4; // Cost per token (completion/output)
  double cpit = 5; // Cost per input token (prompt)
  double cache_write_pt = 6; // Cost per cache write token
  double cache_read_pt = 7; // Cost per cache read token
  string currency = 8;
  string namespace = 9; // NEW: Namespace for filtering
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

// FilterConfig represents a filter configuration
message FilterConfig {
  uint32 id = 1;
  string name = 2;
  string description = 3;
  string script = 4;
  bool is_active = 5;
  int32 order_index = 6;
  string namespace = 7; // NEW: Namespace for filtering
  repeated uint32 llm_ids = 8; // Associated LLM IDs
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  bool response_filter = 11; // true = response filter, false = request filter
}

// PluginConfig represents a plugin configuration
message PluginConfig {
  uint32 id = 1;
  string name = 2;
  string description = 3;
  string command = 4;
  string checksum = 5;
  string config = 6; // JSON string
  string hook_type = 7;
  bool is_active = 8;
  string namespace = 9; // NEW: Namespace for filtering
  repeated uint32 llm_ids = 10; // Associated LLM IDs
  google.protobuf.Timestamp created_at = 11;
  google.protobuf.Timestamp updated_at = 12;
  repeated string service_scopes = 13; // Service API scopes (for plugins with service access)
  repeated string hook_types = 14; // NEW: All hook types this plugin supports (for hybrid plugins)
}

// ModelRouterConfig represents a model router configuration (Enterprise)
message ModelRouterConfig {
  uint32 id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  string api_compat = 5; // API compatibility format (e.g., "openai")
  bool is_active = 6;
  string namespace = 7;
  repeated ModelPoolConfig pools = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

// ModelPoolConfig represents a pool within a model router
message ModelPoolConfig {
  uint32 id = 1;
  string name = 2;
  string model_pattern = 3; // Glob pattern for model matching (e.g., "claude-*")
  string selection_algorithm = 4; // "round_robin" or "weighted"
  int32 priority = 5; // Higher priority pools are checked first
  repeated PoolVendorConfig vendors = 6;
  repeated ModelMappingConfig mappings = 7;
}

// PoolVendorConfig represents an LLM vendor within a pool
message PoolVendorConfig {
  uint32 id = 1;
  uint32 llm_id = 2;
  string llm_slug = 3; // Denormalized for quick lookup
  int32 weight = 4; // Used for weighted selection
  bool is_active = 5;
}

// ModelMappingConfig represents a model name mapping within a pool
message ModelMappingConfig {
  uint32 id = 1;
  string source_model = 2; // Model name from request
  string target_model = 3; // Model name to send to vendor
}

// ConfigurationSnapshot represents a complete configuration state
message ConfigurationSnapshot {
  string version = 1; // NEW: Configuration version for tracking
  repeated LLMConfig llms = 2;
  repeated AppConfig apps = 3;
  // tokens removed - will be validated on-demand via gRPC
  repeated ModelPriceConfig model_prices = 4;
  repeated FilterConfig filters = 5;
  repeated PluginConfig plugins = 6;
  string edge_namespace = 7; // Namespace this snapshot is filtered for
  google.protobuf.Timestamp snapshot_time = 8;
  repeated ModelRouterConfig model_routers = 9; // Enterprise: Model router configurations
}

// ConfigurationChange represents a single configuration change
message ConfigurationChange {
  enum ChangeType {
    CREATE = 0;
    UPDATE = 1;
    DELETE = 2;
  }
  
  enum EntityType {
    LLM = 0;
    APP = 1;
    TOKEN = 2;
    MODEL_PRICE = 3;
    FILTER = 4;
    PLUGIN = 5;
    MODEL_ROUTER = 6;
  }
  
  ChangeType change_type = 1;
  EntityType entity_type = 2;
  uint32 entity_id = 3;
  string entity_data = 4; // JSON serialized entity data
  string namespace = 5;   // Namespace of the changed entity
  google.protobuf.Timestamp timestamp = 6;
}

// HealthStatus represents the health status of an instance
message HealthStatus {
  enum Status {
    HEALTHY = 0;
    DEGRADED = 1;
    UNHEALTHY = 2;
  }
  
  Status status = 1;
  string message = 2;
  google.protobuf.Timestamp timestamp = 3;
  map<string, string> metrics = 4; // Additional health metrics
}