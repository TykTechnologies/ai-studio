# Example mixed configuration - different plugins for different data types
# This shows how to use different collection strategies per data type

version: "1.0"

data_collection_plugins:
  # Store proxy logs in files AND database (for redundancy)
  - name: "proxy-backup-files"
    path: "./plugins/examples/file_proxy_collector/file_proxy_collector"
    enabled: true
    priority: 100
    replace_database: false  # Supplement - keep both
    hook_types: 
      - "proxy_log"
    config:
      output_directory: "./data/backup/proxy_logs"
      enabled: true
      
  # Store analytics ONLY in files (replace database)
  - name: "analytics-csv-only"
    path: "./plugins/examples/file_analytics_collector/file_analytics_collector"
    enabled: true
    priority: 200
    replace_database: true   # Replace database storage
    hook_types:
      - "analytics" 
    config:
      output_directory: "./data/analytics_csv"
      enabled: true
      format: "csv"  # CSV for easy Excel import
      
  # Store budget in files only with aggregation
  - name: "budget-reports"
    path: "./plugins/examples/file_budget_collector/file_budget_collector"
    enabled: true  
    priority: 300
    replace_database: true   # Replace database storage
    hook_types:
      - "budget"
    config:
      output_directory: "./data/budget_reports"
      enabled: true
      format: "csv"
      aggregate_mode: true   # Generate summary reports
      
  # Elasticsearch for all data types (supplement mode)
  - name: "elasticsearch-supplement"
    path: "./plugins/examples/elasticsearch_collector/elasticsearch_collector"
    enabled: false  # Disabled - uncomment and configure to use
    priority: 50   # Lower priority - runs after file plugins
    replace_database: false  # Supplement mode
    hook_types:
      - "proxy_log"
      - "analytics"
      - "budget"
    config:
      elasticsearch_url: "${ELASTICSEARCH_URL:-http://localhost:9200}"
      username: "${ELASTICSEARCH_USERNAME}"
      password: "${ELASTICSEARCH_PASSWORD}"
      indices:
        proxy_logs: "microgateway-proxy-logs"
        analytics: "microgateway-analytics"
        budget: "microgateway-budget"