# Example configuration for file-based data collection plugins (REPLACE database storage)
# Use this via: PLUGINS_CONFIG_PATH=./examples/plugins-file-collectors-replace.yaml
# WARNING: This configuration skips database storage completely!

version: "1.0"

data_collection_plugins:
  # Proxy Log Collector - REPLACES database storage for proxy logs
  - name: "proxy-log-files-only"
    path: "./plugins/examples/file_proxy_collector/file_proxy_collector"
    enabled: true
    priority: 100
    replace_database: true  # ⚠️ REPLACES database storage
    hook_types: 
      - "proxy_log"
    config:
      output_directory: "${DATA_OUTPUT_DIR:-./data/files_only/proxy_logs}"
      enabled: true
      
  # Analytics Collector - REPLACES database storage for analytics
  - name: "analytics-files-only"
    path: "./plugins/examples/file_analytics_collector/file_analytics_collector"
    enabled: true
    priority: 200
    replace_database: true  # ⚠️ REPLACES database storage
    hook_types:
      - "analytics" 
    config:
      output_directory: "${DATA_OUTPUT_DIR:-./data/files_only/analytics}"
      enabled: true
      format: "csv"  # CSV format for analysis
      
  # Budget Collector - REPLACES database storage for budget
  - name: "budget-files-only"
    path: "./plugins/examples/file_budget_collector/file_budget_collector"
    enabled: true  
    priority: 300
    replace_database: true  # ⚠️ REPLACES database storage
    hook_types:
      - "budget"
    config:
      output_directory: "${DATA_OUTPUT_DIR:-./data/files_only/budget}"
      enabled: true
      format: "jsonl"
      aggregate_mode: true  # Keep running totals