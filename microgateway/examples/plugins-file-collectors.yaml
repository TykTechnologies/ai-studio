# Example configuration for file-based data collection plugins
# Use this via: PLUGINS_CONFIG_PATH=./examples/plugins-file-collectors.yaml

version: "1.0"

data_collection_plugins:
  # Proxy Log Collector - Stores full request/response data
  - name: "proxy-log-files"
    path: "./plugins/examples/file_proxy_collector/file_proxy_collector"
    enabled: true
    priority: 100
    replace_database: false  # Supplement database storage
    hook_types: 
      - "proxy_log"
    config:
      output_directory: "${DATA_OUTPUT_DIR:-./data/collected/proxy_logs}"
      enabled: true
      
  # Analytics Collector - Stores token usage and cost data  
  - name: "analytics-files"
    path: "./plugins/examples/file_analytics_collector/file_analytics_collector"
    enabled: true
    priority: 200
    replace_database: false  # Supplement database storage
    hook_types:
      - "analytics" 
    config:
      output_directory: "${DATA_OUTPUT_DIR:-./data/collected/analytics}"
      enabled: true
      format: "jsonl"  # Can be "jsonl" or "csv"
      
  # Budget Collector - Stores budget usage tracking
  - name: "budget-files"
    path: "./plugins/examples/file_budget_collector/file_budget_collector"
    enabled: true  
    priority: 300
    replace_database: false  # Supplement database storage
    hook_types:
      - "budget"
    config:
      output_directory: "${DATA_OUTPUT_DIR:-./data/collected/budget}"
      enabled: true
      format: "csv"  # CSV format for easy spreadsheet analysis
      aggregate_mode: true  # Maintain running totals per app/period