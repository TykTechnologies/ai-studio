midsommar:
  ingress:
    enabled: false
  service:
    type: NodePort
    ports:
      - name: http
        port: 8080
        targetPort: 8080
        nodePort: 32580
      - name: gateway
        port: 9090
        targetPort: 9090
        nodePort: 32590
      - name: grpc
        port: 50051
        targetPort: 50051

config:
  allowRegistrations: "true"
  siteUrl: "http://localhost:32580"
  fromEmail: "noreply@localhost"
  devMode: "true"
  databaseType: "postgres"
  tykAiSecretKey: "your-secret-key"
  tykAiLicense: "your-license"
  ociCacheDir: "./data/cache/plugins"
  ociRequireSignature: "false"
  gatewayMode: "control"
  grpcPort: "50051"
  grpcHost: "0.0.0.0"
  grpcTlsInsecure: "true"
  grpcAuthToken: "your-grpc-auth-token"
  microgatewayEncryptionKey: "your-encryption-key"
  # proxyUrl, toolDisplayUrl, datasourceDisplayUrl auto-resolve from microgateway config

database:
  internal: true
  user: "postgres"
  password: "localdev123"
  name: "tyk_ai_studio"

postgres:
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    size: 1Gi
  service:
    type: ClusterIP
    port: 5432
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

microgateway:
  enabled: true
  image:
    repository: tykio/tyk-microgateway
    tag: v2.0.0
  service:
    type: NodePort
    port: 8080
    nodePort: 32591
  config:
    edgeId: "edge-1"
    edgeNamespace: "default"
  secrets:
    edgeAuthToken: "your-grpc-auth-token"
    encryptionKey: "your-encryption-key"
    tykAiLicense: "your-license"

# Optional services
reranker:
  enabled: true
  image:
    repository: tykio/reranker_cpu
    tag: latest

transformer-server:
  enabled: true
  image:
    repository: tykio/transformer_server_cpu
    tag: latest
