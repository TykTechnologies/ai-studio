midsommar:
  ingress:
    enabled: false # Disable ingress since we're using direct port access

  service:
    type: NodePort # Change to NodePort to expose ports directly
    ports:
      - name: http
        port: 8080
        targetPort: 8080
        nodePort: 32580
      - name: gateway
        port: 9090
        targetPort: 9090
        nodePort: 32590

config:
  allowRegistrations: "true"
  adminEmail: "admin@localhost"
  siteUrl: "http://localhost:32580"
  fromEmail: "noreply@localhost"
  devMode: "true"
  databaseType: "postgres"
  filterSignupDomains: "tyk.io"
  tykAiSecretKey: "your-secret-key" # Add these new values
  tykAiLicense: "your-license"

# Internal database configuration for local development
database:
  internal: true
  user: "postgres"
  password: "localdev123"
  name: "midsommar"

postgres:
  image:
    repository: postgres
    tag: latest
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    size: 1Gi
  service:
    type: ClusterIP
    port: 5432
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Optional services
reranker:
  enabled: true
  image:
    repository: tykio/reranker_cpu
    tag: latest

transformer-server:
  enabled: true
  image:
    repository: tykio/transformer_server_cpu
    tag: latest
