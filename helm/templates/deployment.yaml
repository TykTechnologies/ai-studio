apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "midsommar.fullname" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "midsommar.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        date: "{{ now | unixEpoch }}"
        {{- include "midsommar.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: midsommar
          image: "{{ .Values.midsommar.image.repository }}:{{ .Values.midsommar.image.tag }}"
          imagePullPolicy: {{ .Values.midsommar.image.pullPolicy }}
          env:
            - name: DATABASE_TYPE
              value: {{ .Values.config.databaseType }}
            - name: DATABASE_URL
              value: {{ default (printf "postgres://%s:%s@%s:%v/%s"
                (required "database.user is required" .Values.database.user)
                (required "database.password is required" .Values.database.password)
                (default (printf "%s-postgres" (include "midsommar.fullname" .)) .Values.database.host)
                (default 5432 .Values.database.port)
                (default "midsommar" .Values.database.name))
                .Values.database.url }}
          volumeMounts:
            - name: config
              mountPath: /app/.env
              subPath: .env
            {{- if .Values.config.smtpPass }}
            - name: secrets
              mountPath: /app/secrets
              readOnly: true
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "midsommar.fullname" . }}-config
        {{- if .Values.config.smtpPass }}
        - name: secrets
          secret:
            secretName: {{ include "midsommar.fullname" . }}-secrets
        {{- end }}
{{- if .Values.database.internal }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "midsommar.fullname" . }}-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.database.user }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.database.password }}
            - name: POSTGRES_DB
              value: {{ .Values.database.name }}
          {{- if .Values.postgres.resources }}
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.postgres.persistence.enabled }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          {{- end }}
      {{- if .Values.postgres.persistence.enabled }}
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "midsommar.fullname" . }}-postgres-pvc
      {{- end }}
{{- end }}
