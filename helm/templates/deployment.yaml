apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "midsommar.fullname" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "midsommar.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        date: "{{ now | unixEpoch }}"
        {{- include "midsommar.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: midsommar
          image: "{{ .Values.midsommar.image.repository }}:{{ .Values.midsommar.image.tag }}"
          imagePullPolicy: {{ .Values.midsommar.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: gateway
              containerPort: 9090
              protocol: TCP
          env:
            - name: DATABASE_TYPE
              value: {{ .Values.config.databaseType }}
            - name: DATABASE_URL
              value: {{ default (printf "postgres://%s:%s@%s:%v/%s"
                (required "database.user is required" .Values.database.user)
                (required "database.password is required" .Values.database.password)
                (default (printf "%s-postgres" (include "midsommar.fullname" .)) .Values.database.host)
                (default 5432 .Values.database.port)
                (default "midsommar" .Values.database.name))
                .Values.database.url }}
          envFrom:
            - configMapRef:
                name: {{ include "midsommar.fullname" . }}-config
            - secretRef:
                name: {{ include "midsommar.fullname" . }}-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            successThreshold: {{ .Values.probes.liveness.successThreshold }}
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            successThreshold: {{ .Values.probes.readiness.successThreshold }}
          volumeMounts:
            - name: data
              mountPath: /opt/tyk-ai-studio/data
          {{- if .Values.midsommar.resources }}
          resources:
            {{- toYaml .Values.midsommar.resources | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          emptyDir: {}
{{- if .Values.database.internal }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "midsommar.fullname" . }}-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: {{ .Values.database.user }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.database.password }}
            - name: POSTGRES_DB
              value: {{ .Values.database.name }}
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.user }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.database.user }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          {{- if .Values.postgres.resources }}
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.postgres.persistence.enabled }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          {{- end }}
      {{- if .Values.postgres.persistence.enabled }}
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "midsommar.fullname" . }}-postgres-pvc
      {{- end }}
{{- end }}
