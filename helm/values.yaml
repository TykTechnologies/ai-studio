midsommar:
  image:
    repository: tykio/tyk-ai-studio
    tag: v2.0.0
    pullPolicy: IfNotPresent

  # Service configuration
  service:
    type: ClusterIP
    ports:
      - name: http
        port: 8080
        targetPort: 8080
      - name: gateway
        port: 9090
        targetPort: 9090
      - name: grpc
        port: 50051
        targetPort: 50051

  # Ingress configuration
  ingress:
    enabled: true
    certificateEnabled: true # New field to control certificate usage
    className: nginx
    certManager: # New section for cert-manager specific config
      issuer: letsencrypt-prod
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    hosts:
      - host: midsommar.example.com
        paths:
          - path: /
            pathType: Prefix
            port: 8080
      - host: gateway.example.com
        paths:
          - path: /
            pathType: Prefix
            port: 9090
    tls:
      - secretName: midsommar-tls
        hosts:
          - midsommar.example.com
      - secretName: gateway-tls
        hosts:
          - gateway.example.com

  # Resources configuration
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

database:
  # Set to false to disable built-in PostgreSQL deployment
  internal: true

  # Connection details (used for both internal and external databases)
  url: "" # If set, this takes precedence over individual connection parameters
  host: ""
  port: 5432
  name: "tyk_ai_studio"
  user: "postgres"
  password: "postgres"

# PostgreSQL configuration
postgres:
  enabled: true # This will be tied to database.internal
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 5432

  auth:
    username: postgres
    password: postgres
    database: postgres

  # PostgreSQL persistence
  persistence:
    enabled: true
    storageClass: "" # Empty string means use default storageClass
    size: 10Gi

  # PostgreSQL resources
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# Application configuration
config:
  # SMTP Configuration
  smtpServer: ""
  smtpPort: "587"
  smtpUser: "apikey"
  smtpPass: ""

  # Application Configuration
  allowRegistrations: "true"
  siteUrl: "http://localhost:8080"
  fromEmail: "noreply@example.com"
  devMode: "false"
  databaseType: "postgres"
  filterSignupDomains: ""
  databaseUrl: ""

  # Tyk AI Configuration (sensitive — stored in Secret)
  tykAiSecretKey: ""
  tykAiLicense: ""

  # OCI Plugin / Marketplace Configuration
  ociCacheDir: "./data/cache/plugins"
  ociRequireSignature: "false"  # cosign not available in distroless images

  # Hub-Spoke: Control Plane Mode
  gatewayMode: "control"
  grpcPort: "50051"
  grpcHost: "0.0.0.0"
  grpcTlsInsecure: "true"    # Set to "false" in production with TLS
  grpcAuthToken: ""           # Sensitive — stored in Secret. Generate with: openssl rand -hex 16
  microgatewayEncryptionKey: ""  # Sensitive — stored in Secret. Generate with: openssl rand -hex 16

  # Proxy / Display URLs
  # proxyUrl auto-resolves to the microgateway k8s service if left empty.
  # Override for production with an external-facing URL (e.g. ingress hostname).
  # toolDisplayUrl and datasourceDisplayUrl fall back to proxyUrl if not set.
  proxyUrl: ""
  toolDisplayUrl: ""
  datasourceDisplayUrl: ""

# Microgateway (data plane) — deployed as a subchart
microgateway:
  enabled: true
  image:
    repository: tykio/tyk-microgateway    # Enterprise: tykio/tyk-microgateway-ent
    tag: v2.0.0
  service:
    type: ClusterIP
    port: 8080
  ingress:
    enabled: false
  config:
    controlEndpoint: ""   # Auto-resolved to "<release-name>:50051"
    edgeId: "edge-1"
    edgeNamespace: "default"
    heartbeatInterval: "30s"
    allowInsecure: "true"
    tlsEnabled: "false"
    gatewayTimeout: "300s"
    gatewayEnableFilters: "true"
    gatewayEnableAnalytics: "true"
    analyticsEnabled: "true"
    analyticsBufferSize: "1000"
    analyticsFlushInterval: "10s"
    analyticsRetentionDays: "90"
    databaseType: "sqlite"
    databaseDsn: "file:./data/edge.db?cache=shared&mode=rwc"
    dbAutoMigrate: "true"
    pluginsConfigPath: "/opt/tyk-microgateway/config/analytics-pulse.yaml"
    ociPluginsCacheDir: "/var/lib/microgateway/plugins"
    ociPluginsRequireSignature: "false"
    logLevel: "info"
  # Secrets — MUST match AI Studio config values
  secrets:
    edgeAuthToken: ""         # Must match config.grpcAuthToken
    encryptionKey: ""         # Must match config.microgatewayEncryptionKey
    tykAiLicense: ""          # Must match config.tykAiLicense

# Global configuration
global:
  # Environment name (development, staging, production)
  environment: "development"

  # Node selector for all pods
  nodeSelector: {}

  # Tolerations for all pods
  tolerations: []

  # Affinity rules for all pods
  affinity: {}

# Deployment specific configurations
replicaCount: 1

# Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# Horizontal Pod Autoscaler
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Pod security context
podSecurityContext:
  fsGroup: 2000

# Container security context
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

# Prometheus metrics
metrics:
  enabled: true
  serviceMonitor:
    enabled: false
    interval: 30s

# Configure liveness and readiness probes
probes:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1

# Configure pod priority
priorityClassName: ""

# Extra environment variables
extraEnv:
  []
  # - name: EXTRA_VAR
  #   value: "extra-value"

# Extra volumes and volume mounts
extraVolumes: []
extraVolumeMounts: []

# Service account configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""
