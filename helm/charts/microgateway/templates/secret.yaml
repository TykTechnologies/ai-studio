{{- if .Values.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-microgateway-secrets
type: Opaque
stringData:
  {{- if .Values.secrets.edgeAuthToken }}
  EDGE_AUTH_TOKEN: {{ .Values.secrets.edgeAuthToken | quote }}
  {{- end }}
  {{- if .Values.secrets.encryptionKey }}
  ENCRYPTION_KEY: {{ .Values.secrets.encryptionKey | quote }}
  {{- end }}
  {{- if .Values.secrets.tykAiLicense }}
  TYK_AI_LICENSE: {{ .Values.secrets.tykAiLicense | quote }}
  {{- end }}
{{- end }}
