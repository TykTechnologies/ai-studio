midsommar:
  ingress:
    enabled: true
    certificateEnabled: false
    className: nginx
    hosts:
      - host: app.example.com
        paths:
          - path: /
            pathType: Prefix
            port: 8080
      - host: gateway.example.com
        paths:
          - path: /
            pathType: Prefix
            port: 9090

config:
  allowRegistrations: "true"
  adminEmail: "admin@example.com"
  siteUrl: "http://app.example.com" # Note: using http instead of https
  fromEmail: "noreply@example.com"
  devMode: "false"
  databaseType: "postgres"

# External database configuration
database:
  internal: false
  host: "your-external-postgres-host"
  port: 5432
  name: "midsommar"
  user: "your-db-user"
  password: "your-secure-password-here"

# Optional services (disabled by default)
reranker:
  enabled: false

transformer-server:
  enabled: false
