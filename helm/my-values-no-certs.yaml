midsommar:
  ingress:
    enabled: true
    certificateEnabled: false
    className: nginx
    hosts:
      - host: app.example.com
        paths:
          - path: /
            pathType: Prefix
            port: 8080
      - host: gateway.example.com
        paths:
          - path: /
            pathType: Prefix
            port: 9090

config:
  allowRegistrations: "true"
  adminEmail: "admin@example.com"
  siteUrl: "http://app.example.com" # Note: using http instead of https
  fromEmail: "noreply@example.com"
  devMode: "false"
  databaseType: "postgres"

postgres:
  auth:
    username: postgres
    password: "your-secure-password-here" # Change this!
    database: midsommar
