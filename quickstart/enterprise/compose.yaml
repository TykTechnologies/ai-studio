networks:
  tyk-network:

services:
  midsommar:
    networks:
      - tyk-network
    image: tykio/tyk-ai-studio:pre-release-latest-ent
    volumes:
      - ../confs/midsommar-ent.env:/app/.env
      - ./keys/plugins/plugin-live.pub:/app/keys/plugins/plugin-live.pub:ro
      - ./data/cache/plugins:/app/data/cache/plugins
      - ./data/midsommar/:/app/data/db
    env_file:
      - ../required.env
      - ../confs/midsommar-ent.env
    ports:
      - 8585:8080
      - 9595:9090
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/ready"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
  mgw:
    networks:
      - tyk-network
    image: tykio/microgateway:pre-release-latest-ent
    volumes:
      - ../confs/mgw-ent.env:/app/.env
      - ../confs/mgw-analytics.yaml:/app/mgw-analytics.yaml
      - ./data/mgw:/app/data
      - ./data/cache/plugins:/data/cache/plugins
    env_file:
    - ../required.env
    - ../confs/mgw-ent.env
    ports:
      - 9091:9091
    restart: always
    depends_on:
      midsommar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    
